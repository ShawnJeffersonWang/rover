version: '3.8'

services:
  # Rust 应用服务
  app:
    container_name: agricultural_vision_rust_app
    build: . # 使用当前目录的 Dockerfile 来构建镜像
    ports:
      - "8000:8000" # 将主机的 8000 端口映射到容器的 8000 端口
    depends_on:
      - postgres # 确保在应用启动前，数据库已经启动
    environment:
      # 通过环境变量覆盖配置文件，这是云原生应用的推荐做法
      # config crate 支持这种格式: APP_<一级配置>__<二级配置>
      - APP_SERVER__PORT=8000
      - APP_POSTGRES__HOST=postgres # 关键：主机名是下面的服务名
      # 其他需要覆盖的配置...
    networks:
      - app-network

  # PostgreSQL 服务
  postgres:
    container_name: agricultural_vision_db
    image: postgres:15-alpine # 使用轻量的 alpine 版本
    environment:
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "325523"
      POSTGRES_DB: "agricultural_vision"
    ports:
      - "5432:5432" # 映射端口以便从本地工具连接数据库 (可选)
    volumes:
      - postgres-data:/var/lib/postgresql/data # 持久化数据库数据
    networks:
      - app-network

# 定义数据卷和网络
volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge